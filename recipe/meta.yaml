{% set name = "qa-multi-output-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 1

about:
  home: https://example.com
  summary: "QA multi-output test package"
  license: MIT

outputs:

  # -------------------------------------------------------
  # Output 1: Noarch Python package
  # -------------------------------------------------------
  - name: {{ name }}-python
    build:
      noarch: python
      script: build-python.sh  # [not win]
      script: build-python.bat  # [win]
    requirements:
      host:
        - python
      run:
        - python
    test:
      imports:
        - qa_multi_output_test

  # -------------------------------------------------------
  # Output 2: Noarch data package
  # -------------------------------------------------------
  - name: {{ name }}-data
    build:
      noarch: generic
      script: build-data.sh   # [not win]
      script: build-data.bat  # [win]
    test:
      commands:
        - test -f "$PREFIX/share/qa-multi-output-test/data.txt"                           # [not win]
        - if exist "%PREFIX%\share\qa-multi-output-test\data.txt" (exit 0) else (exit 1)  # [win]
