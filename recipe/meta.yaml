{% set name = "qa-multi-output-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ../src   # local dummy source

build:
  number: 0
  skip: true  # [py<39]

outputs:

  # -------------------------------------------------------
  # Output 1: Main package (like typing_extensions)
  # -------------------------------------------------------
  - name: {{ name }}
    build:
      noarch: python

    requirements:
      host:
        - python
        - pip
        - setuptools
      run:
        - python

    test:
      imports:
        - qa-multi-output-test

  # -------------------------------------------------------
  # Output 2: Compatibility alias package
  # -------------------------------------------------------
  - name: qa-qa-multi-output-test-alias
    build:
      noarch: generic
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage(name, exact=True) }}

    test:
      requires:
        - pip
      commands:
        - pip check

about:
  home: https://example.com/qa-multi-output-test
  license: MIT
  summary: "Dummy multi-output package mimicking typing_extensions"
  description: |
    This is a dummy package used for testing multi-output feedstocks.
    It mimics the structure of typing_extensions with a main package
    and a compatibility alias output.

