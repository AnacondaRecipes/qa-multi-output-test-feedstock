{% set name = "qa-multi-output-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 1

about:
  home: https://example.com
  summary: "QA multi-output test package"
  license: MIT

outputs:

  # -------------------------------------------------------
  # Output 1: Noarch Python package
  # -------------------------------------------------------
  - name: {{ name }}-python
    build:
      noarch: python
      script:
        - mkdir -p $SP_DIR/qa_multi_output_test                                 # [not win]
        - echo "__version__ = '{{ version }}'" > $SP_DIR/qa_multi_output_test/__init__.py  # [not win]
        - if not exist "%SP_DIR%\qa_multi_output_test" mkdir "%SP_DIR%\qa_multi_output_test"  # [win]
        - echo __version__ = '{{ version }}' > "%SP_DIR%\qa_multi_output_test\__init__.py"   # [win]
    requirements:
      host:
        - python
      run:
        - python
    test:
      imports:
        - qa_multi_output_test

  # -------------------------------------------------------
  # Output 2: Noarch data package
  # -------------------------------------------------------
  - name: {{ name }}-data
    build:
      noarch: generic
      script:
        - mkdir -p $PREFIX/share/qa-multi-output-test                              # [not win]
        - echo "dummy data" > $PREFIX/share/qa-multi-output-test/data.txt          # [not win]
        - if not exist "%PREFIX%\share\qa-multi-output-test" mkdir "%PREFIX%\share\qa-multi-output-test"  # [win]
        - echo dummy data > "%PREFIX%\share\qa-multi-output-test\data.txt"         # [win]
    test:
      commands:
        - test -f $PREFIX/share/qa-multi-output-test/data.txt                      # [not win]
        - if exist "%PREFIX%\share\qa-multi-output-test\data.txt" (exit 0) else (exit 1)  # [win]
