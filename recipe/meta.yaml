{% set name = "qa-multi-output-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0

about:
  home: https://example.com
  summary: "QA multi-output test package"
  license: MIT

outputs:

  # -------------------------------------------------------
  # Output 1: Noarch Python package
  # -------------------------------------------------------
  - name: {{ name }}-python
    build:
      noarch: python
    requirements:
      host:
        - python
      run:
        - python
    test:
      imports:
        - qa_multi_output_test

  # -------------------------------------------------------
  # Output 2: Noarch data package
  # -------------------------------------------------------
  - name: {{ name }}-data
    build:
      noarch: generic
    test:
      commands:
        - echo "qa-multi-output-test-data installed successfully"