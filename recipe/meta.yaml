{% set name = "qa-multi-output-test" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ../src   # local dummy source

build:
  number: 1
  skip: true  # [py<39]

outputs:

  # -------------------------------------------------------
  # Output 1: noarch Python package
  # -------------------------------------------------------
  - name: {{ name }}
    build:
      noarch: python
      script: python -m pip install --no-deps --no-build-isolation --ignore-installed .

    requirements:
      host:
        - python
        - pip
        - setuptools
      run:
        - python

    test:
      imports:
        - qa-multi-output-test

  # -------------------------------------------------------
  # Output 2: Platform-specific library
  # -------------------------------------------------------
  - name: {{ name }}-lib
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage(name, exact=True) }}

    test:
      requires:
        - pip
      commands:
        - pip check

  # -------------------------------------------------------
  # Output 3: Platform-specific CLI
  # -------------------------------------------------------
  - name: {{ name }}-cli
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage(name, exact=True) }}

    test:
      requires:
        - pip
      commands:
        - pip check

about:
  home: https://example.com/qa-multi-output-test
  license: MIT
  summary: "Dummy multi-output package for QA testing"
  description: |
    This is a dummy package used for testing multi-output feedstocks.
    It has a noarch Python package, a platform-specific library,
    and a platform-specific CLI output.
